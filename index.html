<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk Security+ Helpdesk Simulator</title>
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg,
      #ff0000, #ff7f00, #ffff00, #00ff00,
      #0000ff, #4b0082, #8f00ff);
    background-size: 400% 400%;
    animation: rainbow 18s ease infinite;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app {
    width: 100%;
    height: 100%;
    display: flex;
    backdrop-filter: blur(10px);
    color: #fff;
  }

  .sidebar {
    width: 320px;
    background: rgba(0, 0, 0, 0.8);
    border-right: 2px solid #0ff;
    box-shadow: 0 0 20px #0ff;
    overflow-y: auto;
  }

  .sidebar h2 {
    margin: 0;
    padding: 16px;
    font-size: 1.2rem;
    color: #0ff;
    border-bottom: 1px solid #0ff;
    text-shadow: 0 0 8px #0ff;
  }

  .sidebar .stats {
    padding: 10px 16px;
    font-size: 0.8rem;
    border-bottom: 1px solid #222;
  }

  .sidebar .stats div {
    margin-bottom: 4px;
  }

  .email-item {
    padding: 12px 16px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background 0.15s;
  }

  .email-item:hover {
    background: rgba(0, 255, 255, 0.12);
  }

  .email-item .subject {
    font-weight: 600;
    color: #0ff;
    text-shadow: 0 0 6px #0ff;
    margin-bottom: 2px;
  }

  .email-item .sender {
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .email-item .meta-row {
    margin-top: 4px;
    display: flex;
    gap: 6px;
    font-size: 0.7rem;
  }

  .pill {
    padding: 2px 6px;
    border-radius: 999px;
    border: 1px solid #0ff;
    color: #0ff;
    text-shadow: 0 0 4px #0ff;
  }

  .pill.easy { border-color: #00ff99; color: #00ff99; }
  .pill.medium { border-color: #ffd166; color: #ffd166; }
  .pill.hard { border-color: #00bfff; color: #00bfff; }
  .pill.nightmare { border-color: #ff0066; color: #ff0066; }

  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.7);
  }

  .email-header h3 {
    margin: 0;
    font-size: 1.4rem;
    color: #0ff;
    text-shadow: 0 0 8px #0ff;
  }

  .email-header .from {
    margin-top: 4px;
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .email-header .domain-line {
    margin-top: 4px;
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .email-body {
    margin-top: 12px;
    font-size: 0.95rem;
  }

  .mood-line {
    margin-top: 12px;
    font-size: 0.9rem;
  }

  .steps {
    margin-top: 20px;
    padding: 16px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid #0ff;
    border-radius: 8px;
    box-shadow: 0 0 12px #0ff;
  }

  .steps h4 {
    margin-top: 0;
    color: #0ff;
    text-shadow: 0 0 6px #0ff;
  }

  .steps ol {
    padding-left: 20px;
  }

  .steps li {
    margin-bottom: 8px;
    cursor: pointer;
  }

  .steps li:hover {
    text-shadow: 0 0 6px #0ff;
  }

  .btn-row {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    color: #000;
    background: #0ff;
    box-shadow: 0 0 10px #0ff;
    transition: transform 0.08s;
  }

  .btn:hover {
    transform: scale(1.05);
  }

  .btn.escalate {
    background: #ff0066;
    box-shadow: 0 0 10px #ff0066;
    color: #fff;
  }

  .btn.disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  .title-bar {
    margin-bottom: 12px;
    font-size: 0.9rem;
    opacity: 0.8;
  }
</style>
</head>

    </div>

      <h3>Welcome, Analyst.</h3>
      <p>Select a ticket from the inbox to start your shift.</p>
    </div>
  </div>
</div>

// ===============================
// GAME STATE
// ===============================
let activeTicket = null;
let currentStep = 0;
let mood = 100;

let powerups = {
  rootAccess: 1,
  logScanner: 1,
  firewallOverride: 1,
  tier2: 1
};

let score = 0;
let hrWarnings = 0;
let ticketsResolved = 0;
let ticketsFailed = 0;

// ===============================
// UTILS
// ===============================
function updateStatsUI() {
  document.getElementById("statScore").textContent = score;
  document.getElementById("statResolved").textContent = ticketsResolved;
  document.getElementById("statFailed").textContent = ticketsFailed;
  document.getElementById("statHR").textContent = hrWarnings;
}

function addPoints(amount) {
  score += amount;
  updateStatsUI();
  checkHRStatus();
}

function removePoints(amount) {
  score -= amount;
  if (score < 0) score = 0;
  updateStatsUI();
  checkHRStatus();
}

function checkHRStatus() {
  if (ticketsFailed >= 10) firePlayer("Too many failed tickets.");
  if (hrWarnings >= 5) firePlayer("Excessive HR warnings.");
  if (score < 50 && ticketsResolved > 20) firePlayer("Performance score too low.");
}

function firePlayer(reason) {
  document.getElementById("emailContent").innerHTML = `
    <h2 style="color:#ff0033; text-shadow:0 0 10px #ff0033;">TERMINATION NOTICE</h2>
    <p><strong>Reason:</strong> ${reason}</p>
    <p>Your access to the Helpdesk System has been revoked.</p>
    <p>Please return your badge to the nearest disposal chute.</p>
    <p style="opacity:0.7;">HR Automated System v3.9</p>
  `;
}

// ===============================
// INBOX RENDERING
// ===============================
function loadInbox() {
  const list = document.getElementById("emailList");
  list.innerHTML = "";

  tickets.forEach((t, index) => {
    const item = document.createElement("div");
    item.className = "email-item";
    item.innerHTML = `
      <div class="subject">${t.subject}</div>
      <div class="sender">${t.sender}</div>
      <div class="meta-row">
        <span class="pill">D${t.domain}</span>
        <span class="pill ${t.difficulty}">${t.difficulty}</span>
      </div>
    `;
    item.onclick = () => openEmail(index);
    list.appendChild(item);
  });
}

// ===============================
// TICKET VIEW + GAMEPLAY
// ===============================
function openEmail(i) {
  activeTicket = tickets[i];
  currentStep = 0;
  mood = 100;
  renderTicket();
}

function renderTicket() {
  if (!activeTicket) return;
  const t = activeTicket;
  const content = document.getElementById("emailContent");

  const moodColor =
    mood > 70 ? "#00ff99" :
    mood > 40 ? "#ffd166" :
    "#ff0066";

  content.innerHTML = `
    <div class="email-header">
      <h3>${t.subject}</h3>
      <div class="from">From: ${t.sender}</div>
      <div class="domain-line">Domain ${t.domain} • Difficulty: ${t.difficulty}</div>
    </div>
    <div class="email-body">
      ${t.body}
    </div>
    <div class="mood-line">
      <strong>Client Mood:</strong>
      <span style="color:${moodColor}; text-shadow:0 0 6px ${moodColor};">${mood}%</span>
    </div>
    <div class="steps">
      <h4>Choose the next correct step</h4>
      <ol id="stepList">
        ${t.steps.map((step, index) => `
          <li onclick="chooseStep(${index})">${step}</li>
        `).join("")}
      </ol>
    </div>
    <div class="btn-row">
      <button class="btn ${powerups.rootAccess <= 0 ? "disabled" : ""}" onclick="usePowerup('rootAccess')">
        Root Access (${powerups.rootAccess})
      </button>
      <button class="btn ${powerups.logScanner <= 0 ? "disabled" : ""}" onclick="usePowerup('logScanner')">
        Log Scanner (${powerups.logScanner})
      </button>
      <button class="btn ${powerups.firewallOverride <= 0 ? "disabled" : ""}" onclick="usePowerup('firewallOverride')">
        Firewall Override (${powerups.firewallOverride})
      </button>
      <button class="btn escalate ${powerups.tier2 <= 0 ? "disabled" : ""}" onclick="usePowerup('tier2')">
        Tier 2 (${powerups.tier2})
      </button>
    </div>
  `;
}

function chooseStep(index) {
  if (!activeTicket) return;
  const t = activeTicket;

  const diffMult = {
    easy: 1,
    medium: 2,
    hard: 3,
    nightmare: 5
  }[t.difficulty] || 1;

  if (index === t.correctSteps[currentStep]) {
    // Correct step
    addPoints(10 * diffMult);
    currentStep++;

    if (currentStep >= t.correctSteps.length) {
      ticketsResolved++;
      addPoints(50 * diffMult);
      updateStatsUI();

      document.getElementById("emailContent").innerHTML = `
        <h2 style="color:#00ff99; text-shadow:0 0 8px #00ff99;">Ticket Resolved ✔️</h2>
        <p>You successfully fixed the issue.</p>
        <p><strong>Score:</strong> ${score}</p>
      `;
      return;
    }

    renderTicket();
  } else {
    // Wrong step
    hrWarnings++;
    removePoints(15 * diffMult);
    updateStatsUI();

    if (powerups.firewallOverride > 0) {
      powerups.firewallOverride--;
    } else {
      mood -= 25;
    }

    if (mood <= 0) {
      ticketsFailed++;
      removePoints(50 * diffMult);
      updateStatsUI();

      document.getElementById("emailContent").innerHTML = `
        <h2 style="color:#ff0066; text-shadow:0 0 8px #ff0066;">Client Rage Quit ❌</h2>
        <p>You lost reputation. HR is not impressed.</p>
        <p><strong>Score:</strong> ${score}</p>
      `;
      checkHRStatus();
      return;
    }

    renderTicket();
  }
}

function usePowerup(type) {
  if (!activeTicket) return;
  if (powerups[type] <= 0) return;

  powerups[type]--;

  if (type === "rootAccess") {
    const t = activeTicket;
    const nextIndex = t.correctSteps[currentStep];
    if (typeof nextIndex === "number") {
      chooseStep(nextIndex);
      return;
    }
  }

  if (type === "logScanner") {
    alert("Log Scanner: highlighting the correct step in your mind. (In a real build, you could visually hint it.)");
  }

  if (type === "firewallOverride") {
    alert("Firewall Override: next wrong step will not reduce mood.");
  }

  if (type === "tier2") {
    ticketsResolved++;
    addPoints(30);
    updateStatsUI();
    document.getElementById("emailContent").innerHTML = `
      <h2 style="color:#0ff; text-shadow:0 0 8px #0ff;">Tier 2 Resolved the Ticket ⚡</h2>
      <p>Nice save. Try not to rely on them too often.</p>
      <p><strong>Score:</strong> ${score}</p>
    `;
  }

  renderTicket();
}

loadInbox();
updateStatsUI();
