<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk Security+ Helpdesk Simulator</title>
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg,
      #ff0000, #ff7f00, #ffff00, #00ff00,

    background-size: 400% 400%;
    animation: rainbow 18s ease infinite;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app {
    width: 100%;
    height: 100%;
    display: flex;
    backdrop-filter: blur(10px);
    color: #fff;
  }

  .sidebar {
    width: 340px;
    background: rgba(0, 0, 0, 0.85);
    border-right: 2px solid #0ff;
    box-shadow: 0 0 20px #0ff;
    overflow-y: auto;
  }

  .sidebar h2 {
    margin: 0;
    padding: 16px;
    font-size: 1.2rem;
    color: #0ff;
    border-bottom: 1px solid #0ff;
    text-shadow: 0 0 8px #0ff;
  }

  .sidebar .stats {
    padding: 10px 16px;
    font-size: 0.8rem;
    border-bottom: 1px solid #222;
  }

  .sidebar .stats div {
    margin-bottom: 4px;
  }

  .os-bar {
    padding: 8px 16px;
    border-bottom: 1px solid #222;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.5);
  }

  .os-bar select {
    background: #000;
    color: #0ff;
    border: 1px solid #0ff;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.8rem;
  }

  .email-item {
    padding: 12px 16px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background 0.15s;
  }

  .email-item:hover {
    background: rgba(0, 255, 255, 0.12);
  }

  .email-item .subject {
    font-weight: 600;
    color: #0ff;
    text-shadow: 0 0 6px #0ff;
    margin-bottom: 2px;
  }

  .email-item .sender {
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .email-item .meta-row {
    margin-top: 4px;
    display: flex;
    gap: 6px;
    font-size: 0.7rem;
  }

  .pill {
    padding: 2px 6px;
    border-radius: 999px;
    border: 1px solid #0ff;
    color: #0ff;
    text-shadow: 0 0 4px #0ff;
  }

  .pill.easy { border-color: #00ff99; color: #00ff99; }
  .pill.medium { border-color: #ffd166; color: #ffd166; }
  .pill.hard { border-color: #00bfff; color: #00bfff; }
  .pill.nightmare { border-color: #ff0066; color: #ff0066; }

  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.7);
  }

  .email-header h3 {
    margin: 0;
    font-size: 1.4rem;
    color: #0ff;
    text-shadow: 0 0 8px #0ff;
  }

  .email-header .from {
    margin-top: 4px;
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .email-header .domain-line {
    margin-top: 4px;
    font-size: 0.8rem;
    opacity: 0.8;
  }

  .email-body {
    margin-top: 12px;
    font-size: 0.95rem;
  }

  .mood-line {
    margin-top: 12px;
    font-size: 0.9rem;
  }

  .reaction-line {
    margin-top: 6px;
    font-size: 0.9rem;
    opacity: 0.9;
  }

  .steps {
    margin-top: 20px;
    padding: 16px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid #0ff;
    border-radius: 8px;
    box-shadow: 0 0 12px #0ff;
  }

  .steps h4 {
    margin-top: 0;
    color: #0ff;
    text-shadow: 0 0 6px #0ff;
  }

  .steps ol {
    padding-left: 20px;
  }

  .steps li {
    margin-bottom: 8px;
    cursor: pointer;
  }

  .steps li:hover {
    text-shadow: 0 0 6px #0ff;
  }

  .btn-row {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    color: #000;
    background: #0ff;
    box-shadow: 0 0 10px #0ff;
    transition: transform 0.08s;
  }

  .btn:hover {
    transform: scale(1.05);
  }

  .btn.escalate {
    background: #ff0066;
    box-shadow: 0 0 10px #ff0066;
    color: #fff;
  }

  .btn.disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  .title-bar {
    margin-bottom: 12px;
    font-size: 0.9rem;
    opacity: 0.8;

let activeTicket = null;
let currentStep = 0;

};

let score = 0;
let hrWarnings = 0;
let ticketsResolved = 0;
let ticketsFailed = 0;
let timeFreezeActive = false;

// ===============================
// UTILS
// ===============================
function updateStatsUI() {
  document.getElementById("statScore").textContent = score;
  document.getElementById("statResolved").textContent = ticketsResolved;
  document.getElementById("statFailed").textContent = ticketsFailed;
  document.getElementById("statHR").textContent = hrWarnings;
  document.getElementById("statInbox").textContent = liveInbox.length;
}

function addPoints(amount) {
  score += amount;
  updateStatsUI();
  checkHRStatus();
}

function removePoints(amount) {
  score -= amount;
  if (score < 0) score = 0;
  updateStatsUI();
  checkHRStatus();
}

function checkHRStatus() {
  if (ticketsFailed >= 10) firePlayer("Too many failed tickets.");
  if (hrWarnings >= 5) firePlayer("Excessive HR warnings.");
  if (score < 50 && ticketsResolved > 20) firePlayer("Performance score too low.");
}

function firePlayer(reason) {
  document.getElementById("emailContent").innerHTML = `
    <h2 style="color:#ff0033; text-shadow:0 0 10px #ff0033;">TERMINATION NOTICE</h2>
    <p><strong>Reason:</strong> ${reason}</p>
    <p>Your access to the Helpdesk System has been revoked.</p>
    <p>Please return your badge to the nearest disposal chute.</p>
    <p style="opacity:0.7;">HR Automated System v3.9</p>
  `;
}

// ===============================
// INBOX & SPAWN SYSTEM
// ===============================
function spawnTicket() {
  if (ticketPool.length === 0) return;

  if (liveInbox.length < maxInboxSize) {
    const next = ticketPool.shift();
    liveInbox.push(next);
    loadInbox();
  } else {
    // Inbox overloaded → HR warning
    hrWarnings++;
    removePoints(10);
    updateStatsUI();
    checkHRStatus();
  }
}

function spawnUrgentTicket() {
  const urgent = {
    id: "URG-" + Math.random().toString(36).substring(2, 8),
    domain: Math.ceil(Math.random() * 5),
    difficulty: "nightmare",
    sender: "alerts@company.com",
    subject: "🔥 URGENT: Critical system failure detected",
    body: "Automated alert: A critical system is failing. Immediate action required.",
    steps: {
      windows: [
        "Open Event Viewer.",
        "Check critical logs under System and Application.",
        "Restart the affected service.",
        "Escalate to Incident Response.",
        "Document the incident in the tracking system."
      ],
      mac: [
        "Open Console.",
        "Check system logs for critical errors.",
        "Restart the affected service.",
        "Escalate to Incident Response.",
        "Document the incident."
      ],
      linux: [
        "Check /var/log/syslog for critical errors.",
        "Restart the affected service.",
        "Check dmesg for hardware issues.",
        "Escalate to Incident Response.",
        "Document the incident."
      ],
      chromeos: [
        "Check admin console device logs.",
        "Restart the device.",
        "Verify policies are applied.",
        "Escalate to Incident Response.",
        "Document the incident."
      ]
    },
    correctSteps: [0, 1, 3, 4]
  };

  liveInbox.push(urgent);
  loadInbox();
}

function loadInbox() {
  const list = document.getElementById("emailList");
  list.innerHTML = "";

  liveInbox.forEach((t) => {
    const item = document.createElement("div");
    item.className = "email-item";
    item.innerHTML = `
      <div class="subject">${t.subject}</div>
      <div class="sender">${t.sender}</div>
      <div class="meta-row">
        <span class="pill">D${t.domain}</span>
        <span class="pill ${t.difficulty}">${t.difficulty}</span>
      </div>
    `;
    item.onclick = () => openEmailById(t.id);
    list.appendChild(item);
  });

  updateStatsUI();
}

function openEmailById(id) {
  activeTicket = liveInbox.find(t => t.id === id);
  currentStep = 0;
  mood = 100;
  lastReaction = "";
  renderTicket();
}

    return t.steps;
  }
  if (t.steps && typeof t.steps === "object") {
    return t.steps[selectedOS] || t.steps.windows || [];
  }
  return [];
}

function renderTicket() {
  if (!activeTicket) return;
  const t = activeTicket;
  const content = document.getElementById("emailContent");

  const moodColor =
    mood > 70 ? "#00ff99" :
    mood > 40 ? "#ffd166" :
    "#ff0066";

  const stepsArray = getStepsForTicket(t);

  content.innerHTML = `
    <div class="email-header">
      <h3>${t.subject}</h3>
      <div class="from">From: ${t.sender}</div>
      <div class="domain-line">Domain ${t.domain} • Difficulty: ${t.difficulty}</div>
    </div>
    <div class="email-body">
      ${t.body}
    </div>
    <div class="mood-line">
      <strong>Client Mood:</strong>
      <span style="color:${moodColor}; text-shadow:0 0 6px ${moodColor};">${mood}%</span>
    </div>
    <div class="reaction-line">
      ${lastReaction ? lastReaction : ""}
    </div>
    <div class="steps">
      <h4>Choose the next correct step</h4>
      <ol id="stepList">
        ${stepsArray.map((step, index) => `
          <li onclick="chooseStep(${index})">${step}</li>
        `).join("")}
      </ol>
    </div>
    <div class="btn-row">
      <button class="btn ${powerups.rootAccess <= 0 ? "disabled" : ""}" onclick="usePowerup('rootAccess')">
        Root Access (${powerups.rootAccess})
      </button>
      <button class="btn ${powerups.logScanner <= 0 ? "disabled" : ""}" onclick="usePowerup('logScanner')">
        Log Scanner (${powerups.logScanner})
      </button>
      <button class="btn ${powerups.firewallOverride <= 0 ? "disabled" : ""}" onclick="usePowerup('firewallOverride')">
        Firewall Override (${powerups.firewallOverride})
      </button>
      <button class="btn ${powerups.timeFreeze <= 0 ? "disabled" : ""}" onclick="usePowerup('timeFreeze')">
        Time Freeze (${powerups.timeFreeze})
      </button>
      <button class="btn ${powerups.systemRestore <= 0 ? "disabled" : ""}" onclick="usePowerup('systemRestore')">
        System Restore (${powerups.systemRestore})
      </button>
      <button class="btn escalate ${powerups.tier2 <= 0 ? "disabled" : ""}" onclick="usePowerup('tier2')">
        Tier 2 (${powerups.tier2})
      </button>
    </div>
  `;
}

function chooseStep(index) {
  if (!activeTicket) return;
  const t = activeTicket;

  const diffMult = {
    easy: 1,
    medium: 2,
    hard: 3,
    nightmare: 5
  }[t.difficulty] || 1;

  const stepsArray = getStepsForTicket(t);

  if (index === t.correctSteps[currentStep]) {
    // Correct step
    addPoints(10 * diffMult);
    currentStep++;
    lastReaction = `<span style="color:#00ff99; text-shadow:0 0 6px #00ff99;">"You saved my day!"</span>`;

    if (currentStep >= t.correctSteps.length) {
      ticketsResolved++;
      addPoints(50 * diffMult);

      // Remove ticket from live inbox
      liveInbox = liveInbox.filter(x => x.id !== t.id);
      activeTicket = null;
      updateStatsUI();

      document.getElementById("emailContent").innerHTML = `
        <h2 style="color:#00ff99; text-shadow:0 0 8px #00ff99;">Ticket Resolved ✔️</h2>
        <p>The client is thrilled. <strong>"You saved my day!"</strong></p>
        <p><strong>Score:</strong> ${score}</p>
      `;
      loadInbox();

      // Difficulty scaling: every 10 resolved, increase inbox size
      if (ticketsResolved % 10 === 0 && maxInboxSize < 20) {
        maxInboxSize++;
      }

      return;
    }

    renderTicket();
  } else {
    // Wrong step
    if (timeFreezeActive) {
      timeFreezeActive = false;
      lastReaction = `<span style="color:#ffd166; text-shadow:0 0 6px #ffd166;">Time is frozen. No penalty… this time.</span>`;
      renderTicket();
      return;
    }

    hrWarnings++;
    removePoints(15 * diffMult);
    lastReaction = `<span style="color:#ff0066; text-shadow:0 0 6px #ff0066;">"You ruined me."</span>`;

    if (powerups.firewallOverride > 0) {
      powerups.firewallOverride--;
    } else {
      mood -= 25;
    }

    if (mood <= 0) {
      ticketsFailed++;
      removePoints(50 * diffMult);
      updateStatsUI();

      document.getElementById("emailContent").innerHTML = `
        <h2 style="color:#ff0066; text-shadow:0 0 8px #ff0066;">Client Rage Quit ❌</h2>
        <p>The client storms off. <strong>"You ruined me."</strong></p>
        <p><strong>Score:</strong> ${score}</p>
      `;

      // Remove ticket from live inbox
      liveInbox = liveInbox.filter(x => x.id !== t.id);
      activeTicket = null;
      loadInbox();
      checkHRStatus();
      return;
    }

    renderTicket();
  }
}

// ===============================
// POWER-UPS
// ===============================
function usePowerup(type) {
  if (!activeTicket) return;
  if (powerups[type] <= 0) return;

  powerups[type]--;

  if (type === "rootAccess") {
    const t = activeTicket;
    const nextIndex = t.correctSteps[currentStep];
    if (typeof nextIndex === "number") {
      chooseStep(nextIndex);
      return;
    }
  }

  if (type === "logScanner") {
    alert("Log Scanner: In a full build, this could highlight the correct step or narrow down options.");
  }

  if (type === "firewallOverride") {
    alert("Firewall Override: Next wrong step will not reduce mood.");
  }

  if (type === "timeFreeze") {
    alert("Time Freeze: Next mistake will not reduce mood or trigger HR.");
    timeFreezeActive = true;
  }

  if (type === "systemRestore") {
    mood = 100;
    lastReaction = `<span style="color:#00ff99; text-shadow:0 0 6px #00ff99;">System Restore: Mood fully restored.</span>`;
  }

  if (type === "tier2") {
    ticketsResolved++;
    addPoints(30);
    updateStatsUI();
    const t = activeTicket;
    liveInbox = liveInbox.filter(x => x.id !== t.id);
    activeTicket = null;
    document.getElementById("emailContent").innerHTML = `
      <h2 style="color:#0ff; text-shadow:0 0 8px #0ff;">Tier 2 Resolved the Ticket ⚡</h2>
      <p>Tier 2 swoops in and fixes everything. The client mutters, <strong>"You saved my day… but not you."</strong></p>
      <p><strong>Score:</strong> ${score}</p>
    `;
    loadInbox();
  }

  renderTicket();
}

// ===============================
// INIT
// ===============================
function initGame() {
  // Start with a few tickets
  for (let i = 0; i < 5; i++) {
    spawnTicket();
  }

  // Spawn new tickets over time
  setInterval(() => {
    spawnTicket();

    // Chance for urgent nightmare ticket
    if (Math.random() < 0.15) {
      spawnUrgentTicket();
    }
  }, 8000);

  updateStatsUI();
}

initGame();
</script>

</html>
